<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.H.I.E.L.D. | Güvenli Ödeme Protokolü</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white py-5">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card bg-dark border-danger shadow-lg p-4 font-mono">
                    <div class="text-center mb-4">
                        <h3 class="font-orbitron text-danger">GÜVENLİ ÖDEME</h3>
                        <p class="small text-secondary">Stark Bank Altyapısı ile Korunuyorsunuz</p>
                    </div>

                    <div id="payment-form">
                        <div class="mb-3">
                            <label class="form-label small">KART SAHİBİ</label>
                            <input type="text" class="form-control bg-black text-white border-secondary" placeholder="AD SOYAD">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label small">KART NUMARASI</label>
                            <input type="text" class="form-control bg-black text-white border-secondary" placeholder="0000 0000 0000 0000">
                        </div>

                        <div class="row mb-4">
                            <div class="col-6">
                                <label class="form-label small">SKT</label>
                                <input type="text" class="form-control bg-black text-white border-secondary" placeholder="AA/YY">
                            </div>
                            <div class="col-6">
                                <label class="form-label small">CVV</label>
                                <input type="password" class="form-control bg-black text-white border-secondary" placeholder="***">
                            </div>
                        </div>

                        <button class="btn btn-danger w-100 fw-bold mb-3" onclick="confirmPayment()">ÖDEMEYİ ONAYLA</button>
                        <a href="index.html" class="btn btn-outline-secondary w-100 btn-sm">ANA KARARGAHA DÖN</a>
                    </div>

                    <div id="success-msg" class="text-center d-none py-4">
                        <i class="fas fa-check-circle fa-4x text-success mb-3"></i>
                        <h4 class="text-success">ERİŞİM ONAYLANDI</h4>
                        <p>Fidanlar S.H.I.E.L.D. kuryeleri ile yola çıktı.</p>
                        <a href="index.html" class="btn btn-success mt-3">YENİ GÖREV</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function confirmPayment() {
            // Basit bir simülasyon
            const form = document.getElementById('payment-form');
            const msg = document.getElementById('success-msg');
            
            form.classList.add('d-none'); // Formu gizle
            msg.classList.remove('d-none'); // Başarı mesajını göster
        }
    </script>
</body>
</html>
